<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso</title>
    <style>
        /* ESTILO PARA DEIXAR TUDO PRETO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Fundo Preto */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Remove barras de rolagem */
            font-family: 'Inter', sans-serif; /* Fonte limpa e moderna */
        }

        /* ESTILO PARA A FRASE EM AZUL NEON */
        h1 {
            color: #0047ff; /* Cor Azul */
            font-size: 2.5rem; /* Tamanho da fonte */
            font-weight: 900; /* Negrito extra */
            text-transform: uppercase; /* Tudo em maiúsculo */
            text-align: center;
            /* Efeito Neon (Sombra) */
            text-shadow: 0 0 15px rgba(0, 71, 255, 0.7), 
                         0 0 30px rgba(0, 71, 255, 0.5);
            letter-spacing: 2px; /* Espaçamento entre letras */
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <h1>RISOS</h1>

</body>
</html>
